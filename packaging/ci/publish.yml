# Publish cozempic to PyPI via Trusted Publishing (OIDC) — no long-lived token.
#
# This hardens the supply-chain ingress raised in #123: releases are built and
# published by CI using a short-lived OIDC token scoped to this repo + workflow,
# instead of a static PyPI API token that could leak. Combined with 2FA on the
# PyPI account and the publish-age window, it shrinks the "compromised publish"
# vector that auto-update would otherwise propagate to every user.
#
# ── ONE-TIME SETUP (on pypi.org, by a maintainer) ─────────────────────────────
#   PyPI → project "cozempic" → Settings → Publishing → "Add a new publisher":
#     Owner:           Ruya-AI
#     Repository:      cozempic
#     Workflow name:   publish.yml
#     Environment:     pypi
#   Then enable 2FA on the PyPI account if not already on. After that, a GitHub
#   Release publishes automatically with no token stored anywhere.
# ──────────────────────────────────────────────────────────────────────────────

name: Publish to PyPI

on:
  release:
    types: [published]   # fires when a GitHub Release is published (tag vX.Y.Z)
  workflow_dispatch: {}  # allow a manual run from the Actions tab

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify version matches the release tag
        if: github.event_name == 'release'
        run: |
          PKG_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG_VER tag=$TAG"
          test "$PKG_VER" = "$TAG" || { echo "::error::pyproject version $PKG_VER != tag $TAG"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # REQUIRED for OIDC trusted publishing — no token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
